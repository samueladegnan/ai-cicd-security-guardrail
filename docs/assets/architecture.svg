<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" role="img" aria-label="AI Guardrail Architecture">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>
  <rect width="900" height="320" fill="#f6f8fa" rx="8"/>
  <text x="450" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1f2328">AI-Driven CI/CD Security Guardrail</text>

  <!-- Boxes -->
  <rect x="30" y="80" width="170" height="70" rx="6" fill="#0969da" fill-opacity="0.1" stroke="#0969da" stroke-width="2"/>
  <text x="115" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1f2328">Static Analysis</text>
  <text x="115" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1f2328">SARIF / SonarQube / cppcheck</text>

  <rect x="240" y="95" width="120" height="60" rx="6" fill="#1f883d" fill-opacity="0.1" stroke="#1f883d" stroke-width="2"/>
  <text x="300" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1f2328">Parser</text>
  <text x="300" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1f2328">normalize findings</text>

  <rect x="400" y="95" width="130" height="60" rx="6" fill="#9a6700" fill-opacity="0.1" stroke="#9a6700" stroke-width="2"/>
  <text x="465" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1f2328">Compliance</text>
  <text x="465" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1f2328">CERT C / MISRA / FIPS</text>

  <rect x="560" y="95" width="150" height="60" rx="6" fill="#8250df" fill-opacity="0.1" stroke="#8250df" stroke-width="2"/>
  <text x="685" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1f2328">LLM Triage Engine</text>
  <text x="685" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1f2328">classify each finding</text>

  <rect x="310" y="230" width="180" height="50" rx="6" fill="#cf222e" fill-opacity="0.1" stroke="#cf222e" stroke-width="2"/>
  <text x="400" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1f2328">Report + Exit Code</text>
  <text x="400" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1f2328">JSON / Markdown / CI fail</text>

  <rect x="580" y="230" width="190" height="50" rx="6" fill="#0969da" fill-opacity="0.1" stroke="#0969da" stroke-width="2"/>
  <text x="685" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1f2328">Code Context</text>
  <text x="685" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1f2328">fetch source lines</text>

  <!-- Arrows -->
  <line x1="200" y1="125" x2="240" y2="125" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="125" x2="400" y2="125" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="530" y1="125" x2="560" y2="125" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="640" y1="155" x2="640" y2="205" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="255" x2="490" y2="255" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="640" y1="205" x2="400" y2="255" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
